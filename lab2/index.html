<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="todo">
            <h2>To-Do list <img src="../images/icon.png"></h2>
            <div class="search-container">
                <input type="text" id="search-box" placeholder="Search tasks..." onkeyup="searchTasks()">
                <label class="case-label">
                    <input type="checkbox" id="case-sensitive" onchange="searchTasks()"> Ignore Case
                </label>
            </div>
            <div class="row">
                <input type="text" id="input-box" placeholder="Add a new task...">
                <button id="addBtn" onclick="addTask()">Add</button>
            </div>
            <ul id = "list-container"></ul>
        </div>
    </div>
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <p id="modalText"></p>
            <div class="modal-buttons">
                <button id="confirmDelete" class="btn-confirm">Yes, delete</button>
                <button id="cancelDelete" class="btn-cancel">No, keep it</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
